<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superviseur OCR Pro - Interface de Traitement</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen p-8">

    <div class="max-w-4xl mx-auto bg-white p-8 rounded-xl border border-slate-200 shadow-sm">
        <h1 class="text-2xl font-bold mb-6 text-slate-900">Upload de Documents CASO</h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700">Sélectionnez vos documents :</label>
                <input type="file" id="fileInput" multiple 
                       class="mt-2 block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-700">Utilisateur actuel :</label>
                <input type="text" id="userInput" value="admin" 
                       class="mt-1 block w-full border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500">
            </div>

            <button onclick="gererUpload()" 
                    class="bg-blue-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-blue-700 transition">
                Envoyer les fichiers
            </button>
        </div>

        <div id="status" class="mt-6 p-4 rounded-lg hidden"></div>
    </div>

    <script>
        const API_URL = "http://localhost:8000"; // Remplacez par votre IP réelle

        async function gererUpload() {
            const fileInput = document.getElementById('fileInput');
            const userInput = document.getElementById('userInput').value;
            const statusDiv = document.getElementById('status');

            if (fileInput.files.length === 0) {
                alert("Veuillez sélectionner au moins un fichier.");
                return;
            }

            // Création du FormData pour le multipart/form-data
            const formData = new FormData();
            for (let i = 0; i < fileInput.files.length; i++) {
                formData.append('files', fileInput.files[i]);
            }
            formData.append('current_user', userInput);

            // Affichage état
            statusDiv.classList.remove('hidden', 'bg-red-100', 'bg-green-100');
            statusDiv.classList.add('bg-blue-50');
            statusDiv.innerText = "Traitement en cours...";

            try {
                const response = await fetch(`${API_URL}/upload-multiple/`, {
                    method: 'POST',
                    body: formData // PAS de header 'Content-Type', le navigateur gère le boundary
                });

                const result = await response.json();

                if (response.ok) {
                    statusDiv.className = "mt-6 p-4 rounded-lg bg-green-100 text-green-800";
                    statusDiv.innerText = "Succès ! " + JSON.stringify(result);
                } else {
                    throw new Error(result.detail || "Erreur lors de l'envoi");
                }
            } catch (error) {
                statusDiv.className = "mt-6 p-4 rounded-lg bg-red-100 text-red-800";
                statusDiv.innerText = "Erreur : " + error.message;
            }
        }
    </script>
</body>
</html>
